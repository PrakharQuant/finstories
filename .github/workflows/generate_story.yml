name: Generate Finance Story

on:
  schedule:
    - cron: "0 3 * * *"   # runs daily
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run generator
        run: python scripts/generate_finance_story.py

      - name: Commit new post
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add _posts/*.md
          git commit -m "Auto generated finance story" || echo "No changes"
          git push
