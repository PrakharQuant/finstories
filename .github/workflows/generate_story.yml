name: Generate Finance Story

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate post
        run: |
          DATE=$(date +'%Y-%m-%d')
          FILE="_posts/${DATE}-finance-story.md"

          echo "---" > $FILE
          echo "layout: post" >> $FILE
          echo "title: \"Finance Story\"" >> $FILE
          echo "date: ${DATE}" >> $FILE
          echo "---" >> $FILE
          echo "" >> $FILE
          echo "This finance story was generated automatically." >> $FILE

      - name: Commit post
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Automated finance story" || echo "No changes"
          git push
