name: Generate Finance Story

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate post
        run: |
          DATE=$(date +'%Y-%m-%d')
          FILE="_posts/${DATE}-finance-story.md"

          echo "---" > $FILE
          echo "layout: post" >> $FILE
          echo "title: \"Finance Story\"" >> $FILE
          echo "date: ${DATE}" >> $FILE
          echo "---" >> $FILE
          echo "" >> $FILE
          echo "This post was generated automatically." >> $FILE

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Automated finance story"
          git push
